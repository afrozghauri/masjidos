services:
  backend:
    build: .
    ports: ["8000:8000"]
    env_file: .env
    volumes: ["./data:/app/data"]
  review:
    build: .
    command: streamlit run app/review_app.py --server.address 0.0.0.0 --server.port 8501
    ports: ["8501:8501"]
    env_file: .env
    volumes: ["./data:/app/data"]
    depends_on: [backend]
